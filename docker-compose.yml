version: '3.8'

services:
  backend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./server:/app
      # Create an anonymous volume for node_modules to avoid host OS compatibility issues
      - /app/node_modules
    command: sh -c "npm install && npm start"
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./client:/app
      # Create an anonymous volume for node_modules
      - /app/node_modules
    # Use --host to bind Vite outside of localhost inside the Docker container
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
